<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>벽돌깨기</title>
  <style>
    :root {
      --bg:     #13121f;
      --surf:   #1d1b2d;
      --border: #2e2b42;
      --accent: #f5c518;
      --text:   #e8e4f2;
      --muted:  #7c7a96;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    nav {
      border-bottom: 1px solid var(--border);
      height: 50px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .nav-home {
      color: var(--accent);
      text-decoration: none;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .nav-home:hover { opacity: 0.75; }
    .nav-title {
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 700;
    }

    .game-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px 20px;
    }

    #breakout-canvas {
      border: 2px solid var(--border);
      display: block;
      cursor: none;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 120px;
    }

    .panel-box {
      background: var(--surf);
      border: 1px solid var(--border);
      padding: 14px 16px;
    }

    .panel-label {
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .panel-value {
      font-family: Consolas, 'Courier New', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .lives-display {
      font-size: 1.2rem;
      letter-spacing: 4px;
    }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .hint kbd {
      font-family: Consolas, 'Courier New', monospace;
      background: var(--border);
      padding: 1px 5px;
      font-size: 0.68rem;
    }

    #start-btn {
      background: var(--accent);
      color: #111;
      border: none;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 10px 16px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    #start-btn:hover { opacity: 0.85; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .overlay.show { display: flex; }
    .overlay-box {
      background: var(--surf);
      border: 2px solid var(--border);
      padding: 36px 48px;
      text-align: center;
    }
    .overlay-box h2 {
      font-family: Consolas, 'Courier New', monospace;
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .overlay-box p { color: var(--muted); margin-bottom: 24px; }
    .overlay-box button {
      background: var(--accent);
      color: #111;
      border: none;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 28px;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .game-area { flex-direction: column; align-items: center; }
      .side-panel { flex-direction: row; flex-wrap: wrap; min-width: 0; width: 100%; max-width: 460px; }
      .panel-box { flex: 1; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-home">← 홈</a>
  <span class="nav-title">🎯 벽돌깨기</span>
  <span></span>
</nav>

<div class="game-area">
  <canvas id="breakout-canvas" width="460" height="420"></canvas>

  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">점수</div>
      <div class="panel-value" id="score">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">생명</div>
      <div class="panel-value lives-display" id="lives">❤️❤️❤️</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">레벨</div>
      <div class="panel-value" id="level">1</div>
    </div>
    <div class="panel-box hint">
      <kbd>마우스</kbd> 패들 이동<br>
      <kbd>←→</kbd> 키보드 이동<br>
      클릭으로 발사
    </div>
    <button id="start-btn" onclick="startGame()">시작</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="ov-title" style="color:var(--accent)">클리어!</h2>
    <p id="ov-msg">점수: 0</p>
    <button onclick="startGame(); document.getElementById('overlay').classList.remove('show')">다시 하기</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('breakout-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const BRICK_ROWS = 5, BRICK_COLS = 10;
  const BRICK_W = 40, BRICK_H = 16, BRICK_GAP = 4;
  const BRICK_OFF_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;
  const BRICK_OFF_Y = 40;

  const BRICK_COLORS = ['#e84855','#e87f28','#f5c518','#4ade80','#4ab0de'];

  const PADDLE_W = 80, PADDLE_H = 12, PADDLE_Y = H - 32;
  const BALL_R = 8;

  let paddle, ball, bricks, score, lives, level, gameRunning, launched;
  let mouseX = W / 2;
  let keys   = {};

  function makeBricks(lv) {
    const rows = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
      const row = [];
      for (let c = 0; c < BRICK_COLS; c++) {
        row.push({ alive: true, hp: r < 2 ? (lv >= 3 ? 2 : 1) : 1 });
      }
      rows.push(row);
    }
    return rows;
  }

  function brickRect(r, c) {
    return {
      x: BRICK_OFF_X + c * (BRICK_W + BRICK_GAP),
      y: BRICK_OFF_Y + r * (BRICK_H + BRICK_GAP),
      w: BRICK_W,
      h: BRICK_H,
    };
  }

  function startGame() {
    score      = 0;
    lives      = 3;
    level      = 1;
    gameRunning = true;
    launched   = false;
    paddle     = { x: W/2 - PADDLE_W/2 };
    ball       = { x: W/2, y: PADDLE_Y - BALL_R - 1, vx: 3, vy: -4 };
    bricks     = makeBricks(level);
    updateUI();
    document.getElementById('start-btn').textContent = '재시작';
    requestAnimationFrame(loop);
  }

  function resetBall() {
    launched = false;
    ball = { x: paddle.x + PADDLE_W/2, y: PADDLE_Y - BALL_R - 1, vx: 3, vy: -4 };
  }

  function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = '❤️'.repeat(lives);
    document.getElementById('level').textContent = level;
  }

  function loop() {
    if (!gameRunning) return;

    // 패들 키보드
    if (keys['ArrowLeft']  && paddle.x > 0)             paddle.x -= 5;
    if (keys['ArrowRight'] && paddle.x < W - PADDLE_W)  paddle.x += 5;
    if (!launched) ball.x = paddle.x + PADDLE_W / 2;

    // 공 이동
    if (launched) {
      ball.x += ball.vx;
      ball.y += ball.vy;

      // 벽
      if (ball.x - BALL_R < 0)      { ball.x = BALL_R;      ball.vx = Math.abs(ball.vx); }
      if (ball.x + BALL_R > W)       { ball.x = W - BALL_R;  ball.vx = -Math.abs(ball.vx); }
      if (ball.y - BALL_R < 0)       { ball.y = BALL_R;      ball.vy = Math.abs(ball.vy); }

      // 패들
      if (
        ball.vy > 0 &&
        ball.y + BALL_R >= PADDLE_Y &&
        ball.y + BALL_R <= PADDLE_Y + PADDLE_H &&
        ball.x >= paddle.x - BALL_R &&
        ball.x <= paddle.x + PADDLE_W + BALL_R
      ) {
        const hit = (ball.x - (paddle.x + PADDLE_W/2)) / (PADDLE_W/2);
        ball.vx = hit * 5;
        ball.vy = -Math.abs(ball.vy);
        ball.y  = PADDLE_Y - BALL_R;
      }

      // 바닥
      if (ball.y - BALL_R > H) {
        lives--;
        updateUI();
        if (lives <= 0) { endGame(false); return; }
        resetBall();
      }

      // 벽돌 충돌
      outer: for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          const b = bricks[r][c];
          if (!b.alive) continue;
          const { x, y, w, h } = brickRect(r, c);
          if (ball.x + BALL_R > x && ball.x - BALL_R < x+w &&
              ball.y + BALL_R > y && ball.y - BALL_R < y+h) {
            b.hp--;
            if (b.hp <= 0) {
              b.alive = false;
              score += 10 * level;
              updateUI();
            }
            // 반사 방향
            const overlapL = ball.x + BALL_R - x;
            const overlapR = x + w - (ball.x - BALL_R);
            const overlapT = ball.y + BALL_R - y;
            const overlapB = y + h - (ball.y - BALL_R);
            const minH = Math.min(overlapL, overlapR);
            const minV = Math.min(overlapT, overlapB);
            if (minH < minV) ball.vx = overlapL < overlapR ? -Math.abs(ball.vx) : Math.abs(ball.vx);
            else             ball.vy = overlapT < overlapB ? -Math.abs(ball.vy) : Math.abs(ball.vy);
            break outer;
          }
        }
      }

      // 클리어 체크
      if (bricks.every(row => row.every(b => !b.alive))) {
        level++;
        if (level > 3) { endGame(true); return; }
        bricks  = makeBricks(level);
        launched = false;
        ball.vx += 0.5;
        ball.vy -= 0.5;
        ball = { x: paddle.x + PADDLE_W/2, y: PADDLE_Y - BALL_R - 1,
                 vx: 3 + level * 0.5, vy: -(4 + level * 0.5) };
        updateUI();
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  function draw() {
    ctx.fillStyle = '#0a0916';
    ctx.fillRect(0, 0, W, H);

    // 벽돌
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        const b = bricks[r][c];
        if (!b.alive) continue;
        const { x, y, w, h } = brickRect(r, c);
        const color = BRICK_COLORS[r % BRICK_COLORS.length];
        ctx.fillStyle = b.hp > 1 ? '#fff' : color;
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(x, y, w, 3);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(x, y+h-3, w, 3);
      }
    }

    // 패들
    ctx.fillStyle = '#f5c518';
    ctx.fillRect(paddle.x, PADDLE_Y, PADDLE_W, PADDLE_H);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(paddle.x, PADDLE_Y, PADDLE_W, 3);

    // 공
    const grd = ctx.createRadialGradient(
      ball.x - 2, ball.y - 2, 1,
      ball.x, ball.y, BALL_R
    );
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(1, '#c0c0e0');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();

    // 발사 대기 메시지
    if (!launched) {
      ctx.fillStyle = 'rgba(124,122,150,0.85)';
      ctx.font = '14px Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('클릭 또는 Space로 발사', W/2, H - 14);
    }
  }

  function endGame(win) {
    gameRunning = false;
    document.getElementById('ov-title').textContent  = win ? '🎉 클리어!' : '💥 게임 오버';
    document.getElementById('ov-title').style.color  = win ? 'var(--accent)' : '#e84855';
    document.getElementById('ov-msg').textContent    = `점수: ${score}  |  레벨: ${level}`;
    document.getElementById('overlay').classList.add('show');
  }

  // ── 입력 ──
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    paddle.x = Math.max(0, Math.min(W - PADDLE_W, mouseX - PADDLE_W/2));
  });

  canvas.addEventListener('click', () => { if (gameRunning && !launched) launched = true; });

  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameRunning && !launched) launched = true;
    }
    if (['ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // 초기 화면
  ctx.fillStyle = '#0a0916';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#7c7a96';
  ctx.font = '600 16px Consolas, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('시작 버튼을 누르세요', W/2, H/2);
</script>
</body>
</html>
